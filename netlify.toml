[build]
  publish = "."

[forms]
  spam_filter = true

# Security & SEO headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets.
# CSS/JS must revalidate (cheap ETag check) so visitors always get styles
# matching the HTML — a year-long immutable cache here once served stale
# stylesheets to returning visitors after a redesign.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Redirect www to non-www
[[redirects]]
  from = "https://www.gillmedia.net/*"
  to = "https://gillmedia.net/:splat"
  status = 301
  force = true
